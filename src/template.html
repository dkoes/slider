  <body>
    <main id="slider-root" aria-live="polite">
      <section id="stage" aria-label="Slideshow stage"></section>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Open menu">☰</button>
      <nav id="menu-panel" class="menu-panel" aria-label="Slideshow menu">
        <button id="menu-announcements" class="menu-item" type="button">Announcements</button>
        <button id="menu-posters" class="menu-item" type="button">Posters</button>
        <div class="menu-section">
          <button class="menu-item menu-parent" type="button">Labs</button>
          <div id="labs-menu" class="labs-menu"></div>
        </div>
        <div class="menu-divider" role="separator"></div>
        <button id="menu-cats" class="menu-item" type="button">Cats</button>
        <button id="menu-puppies" class="menu-item" type="button">Puppies</button>
        <button id="menu-jellyfish" class="menu-item" type="button">Jellyfish</button>
        <div id="fullscreen-divider" class="menu-divider" role="separator"></div>
        <button id="menu-fullscreen" class="menu-item" type="button">Fullscreen</button>
      </nav>
      <button id="previous-slide" class="nav-control nav-control-left" type="button" aria-label="Previous slide">&lsaquo;</button>
      <button id="next-slide" class="nav-control nav-control-right" type="button" aria-label="Next slide">&rsaquo;</button>
      <div id="zoom-controls" aria-label="Zoom controls">
        <button id="zoom-in" class="zoom-control" type="button" aria-label="Zoom in">+</button>
        <button id="zoom-out" class="zoom-control" type="button" aria-label="Zoom out">&minus;</button>
      </div>
      <div id="live-stream-countdown" class="live-stream-countdown" aria-live="polite">
        <span id="live-stream-time">30:00</span>
        <button id="live-stream-reset" type="button">Reset</button>
      </div>
      <div id="status" role="status"></div>
      <div id="banner" role="alert"></div>
    </main>
